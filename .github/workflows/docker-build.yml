name: Docker Build and Push

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: false
        default: 'latest'
        type: string

env:
  DOCKER_IMAGE: dentizone
  DOCKER_TAG: ${{ github.event.inputs.tag || 'latest' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: false

      - name: Debug Docker Hub Login
        run: |
          echo "Checking Docker Hub login status..."
          docker info
          echo "Listing Docker Hub images..."
          docker images

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache-filters: true 
          
      - name: Trigger Coolify Deploy + NTFY
        uses: gitnasr/coolify-trigger-deploy@v2.0.0
        with:
          docker_image: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          ntfy_topic: ${{ secrets.NTFY_TOPIC }}
          ntfy_token: ${{ secrets.NTFY_TOKEN }}
          coolify_url: ${{ secrets.COOLIFY_URL }}
          coolify_resource_id: ${{ secrets.COOLIFY_RESOURCE_ID }}
          coolify_api_token: ${{ secrets.COOLIFY_API_TOKEN }}
  
  
 
